[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: bugbear
select = ["E", "W", "F", "I", "UP", "B"]
ignore = [
    "E501",   # line length handled by black
    "B008",   # function calls in argument defaults (FastAPI-style, not used here)
    "B905",   # zip() strict= — adding it changes runtime behavior; out of scope
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]   # sys.path insert before imports in test entrypoints
"scripts/*" = ["E402"]
"app/*" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
